{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
  <div class="card mx-auto" style="max-width:720px">
    <div class="card-body">
      <h4 class="card-title">Ajouter un service</h4>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-success">Enregistrer</button>
      </form>
    </div>
  </div>
{% endblock %}
